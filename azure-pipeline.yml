trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: backend-stage

stages:

  # =========================================================
  # BUILD STAGE
  # =========================================================
  - stage: Build
    displayName: 'Build Stage'

    jobs:
      - job: BuildJob
        displayName: 'Build Spring Boot Application'

        steps:

          - checkout: self

          - task: Maven@4
            displayName: 'Maven Clean Package'

            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean package -DskipTests'
              publishJUnitResults: false
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '21'
              mavenVersionOption: 'Default'

            env:
              SPRING_PROFILES_ACTIVE: $(SPRING_PROFILES_ACTIVE)
              DB_URL: $(DB_URL)
              DB_USERNAME: $(DB_USERNAME)
              DB_PASSWORD: $(DB_PASSWORD)

          - task: CopyFiles@2
            displayName: 'Copy JAR to Artifact Staging'

            inputs:
              Contents: 'target/*.jar'
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifact'

            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'drop'


  # =========================================================
  # DEPLOY STAGE
  # =========================================================
  - stage: DeployStage
    displayName: 'Deploy Stage'

    dependsOn: Build

    jobs:
      - deployment: DeployToAzure
        displayName: 'Deploy Spring Boot to Azure App Service'

        environment: 'stage'

        strategy:
          runOnce:
            deploy:

              steps:

                - download: current
                  artifact: drop

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure App Service'

                  inputs:
                    azureSubscription: $(azureSubscription)
                    appType: 'webAppLinux'
                    appName: 'study-platform'
                    package: '$(Pipeline.Workspace)/drop/*.jar'
                    runtimeStack: 'JAVA|21-java21'

                    startupCommand: >
                      java -jar
                      /home/site/wwwroot/*.jar